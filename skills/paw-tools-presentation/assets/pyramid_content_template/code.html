<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Public+Sans:wght@400;500;600&amp;family=Inter:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e7e8e9",
              "primary-container": "#003366",
              "on-tertiary": "#ffffff",
              "error": "#ba1a1a",
              "on-secondary-fixed": "#171c22",
              "surface-container": "#edeeef",
              "on-secondary-fixed-variant": "#42474e",
              "background": "#f8f9fa",
              "outline-variant": "#c3c6d1",
              "tertiary-container": "#592300",
              "outline": "#737780",
              "surface": "#f8f9fa",
              "secondary-container": "#dbe0e8",
              "on-primary-container": "#799dd6",
              "on-surface": "#191c1d",
              "tertiary": "#381300",
              "on-secondary-container": "#5e636a",
              "on-primary-fixed": "#001b3c",
              "on-primary-fixed-variant": "#1f477b",
              "error-container": "#ffdad6",
              "primary": "#001e40",
              "on-error": "#ffffff",
              "tertiary-fixed-dim": "#ffb690",
              "on-primary": "#ffffff",
              "on-tertiary-container": "#d8885c",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary-fixed-variant": "#723610",
              "secondary-fixed": "#dee3eb",
              "on-surface-variant": "#43474f",
              "surface-dim": "#d9dadb",
              "on-background": "#191c1d",
              "primary-fixed-dim": "#a7c8ff",
              "on-secondary": "#ffffff",
              "surface-variant": "#e1e3e4",
              "inverse-on-surface": "#f0f1f2",
              "surface-tint": "#3a5f94",
              "secondary-fixed-dim": "#c2c7cf",
              "inverse-primary": "#a7c8ff",
              "tertiary-fixed": "#ffdbca",
              "on-tertiary-fixed": "#341100",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#d5e3ff",
              "secondary": "#5a5f66",
              "on-error-container": "#93000a",
              "surface-container-low": "#f3f4f5",
              "surface-bright": "#f8f9fa",
              "inverse-surface": "#2e3132"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Public Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0rem", "lg": "0rem", "xl": "0rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .presentation-canvas {
            aspect-ratio: 16 / 9;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            overflow: hidden;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen overflow-hidden">
<!-- Presentation Canvas -->
<main class="presentation-canvas bg-surface relative flex flex-col">
<!-- Main Content Area -->
<section class="flex-1 px-24 py-20 flex flex-col justify-center gap-16">
<!-- Lead Message (The Tip of the Pyramid) -->
<div class="max-w-4xl border-l-4 border-primary pl-8">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-secondary-container mb-4 block">[Section Title / Context]</span>
<h1 class="font-headline text-5xl font-extrabold text-primary tracking-tight leading-tight">
                    [Action-Oriented Lead Message]
                </h1>
</div>
<!-- Evidence Pillars (The Support Structure) -->
<div class="grid grid-cols-3 gap-12 relative">
<!-- Pillar 1 -->
<div class="flex flex-col gap-6">
<div class="w-12 h-12 flex items-center justify-center bg-primary text-on-primary">
<span class="material-symbols-outlined" data-icon="category">category</span>
</div>
<div class="space-y-4">
<h2 class="font-headline text-xl font-bold text-primary tracking-tight">[Key Pillar 1]</h2>
<p class="font-body text-base text-on-surface-variant leading-relaxed">
                            [Supporting Evidence 1]
                        </p>
</div>
</div>
<!-- Pillar 2 -->
<div class="flex flex-col gap-6">
<div class="w-12 h-12 flex items-center justify-center bg-primary text-on-primary">
<span class="material-symbols-outlined" data-icon="trending_up">trending_up</span>
</div>
<div class="space-y-4">
<h2 class="font-headline text-xl font-bold text-primary tracking-tight">[Key Pillar 2]</h2>
<p class="font-body text-base text-on-surface-variant leading-relaxed">
                            [Supporting Evidence 2]
                        </p>
</div>
</div>
<!-- Pillar 3 -->
<div class="flex flex-col gap-6">
<div class="w-12 h-12 flex items-center justify-center bg-primary text-on-primary">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
</div>
<div class="space-y-4">
<h2 class="font-headline text-xl font-bold text-primary tracking-tight">[Key Pillar 3]</h2>
<p class="font-body text-base text-on-surface-variant leading-relaxed">
                            [Supporting Evidence 3]
                        </p>
</div>
</div>
</div>
</section>
<!-- Minimalist Presentation Footer -->
<footer class="w-full flex justify-between items-center px-24 py-10 opacity-60">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">[Confidentiality Statement]</span>
<div class="flex gap-8">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface font-bold">[Slide Number]</span>
</div>
</footer>
<!-- Decorative Subtle Divider -->
<div class="absolute bottom-28 left-24 right-24 h-[1px] bg-outline-variant opacity-20"></div>
<!-- Subtle background accents for slide depth -->
<div class="absolute top-0 right-0 w-1/3 h-full bg-surface-container-high -z-10 opacity-30"></div>
</main>
</body></html>
